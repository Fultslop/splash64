<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FS Splash</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shojumaru&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'C64 Pro Mono';
      src: url('./fonts/c64/fonts/C64_Pro_Mono-STYLE.woff2') format('woff2'),

      font-weight: normal;
      font-style:  normal;
    }
  </style>
  <style>

      display: flex;

  <canvas id="screen"></canvas>
